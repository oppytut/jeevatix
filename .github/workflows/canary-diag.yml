name: Canary Diagnostic
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Verify workers.dev URLs from GH Actions
        run: |
          echo "=== Test workers.dev URLs (bypass CF zone) ==="
          for url in \
            https://jeevatix-staging-api.ariefna95.workers.dev/health \
            https://jeevatix-staging-buyer.ariefna95.workers.dev/events \
            https://jeevatix-staging-seller.ariefna95.workers.dev/login \
            https://jeevatix-staging-admin.ariefna95.workers.dev/login; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url")
            echo "GET $url -> $status"
          done
          echo ""
          echo "=== Test POST seller login workers.dev with Origin ==="
          status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
            -X POST "https://jeevatix-staging-seller.ariefna95.workers.dev/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Origin: https://jeevatix-staging-seller.ariefna95.workers.dev" \
            --data "email=canary@invalid.test&password=invalid")
          echo "POST seller workers.dev (Origin) -> $status"
          echo ""
          echo "=== Test POST seller login workers.dev WITHOUT Origin ==="
          status=$(curl -sS -o /tmp/b.txt -w "%{http_code}" --max-time 15 \
            -X POST "https://jeevatix-staging-seller.ariefna95.workers.dev/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "email=canary@invalid.test&password=invalid")
          echo "POST seller workers.dev (no Origin) -> $status"
          echo "Body: $(head -c 100 /tmp/b.txt)"
