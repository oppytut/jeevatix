name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "❌ Confirmation failed. Type 'deploy-production' to proceed."
            exit 1
          fi
          echo "✅ Confirmation accepted"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jeevatix
          POSTGRES_PASSWORD: jeevatix
          POSTGRES_DB: jeevatix_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PUBLIC_API_BASE_URL: ${{ vars.PRODUCTION_API_URL || 'https://api.jeevatix.com' }}
      PUBLIC_PARTYKIT_HOST: ${{ vars.PUBLIC_PARTYKIT_HOST }}
      DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix_test
      JWT_SECRET: vitest-ci-secret
      PAYMENT_WEBHOOK_SECRET: vitest-ci-webhook-secret
      # SvelteKit `analyse` postbuild loads SSR chunks in Node, where the
      # Track B guard in apps/{buyer,seller,admin}/src/lib/{auth,http}.ts
      # evaluates at module load. Without INTERNAL_API_URL the guard throws
      # and the build fails before deploy. Empty fallback retained: production
      # deploy without PRODUCTION_INTERNAL_API_URL set is intended hard-fail.
      INTERNAL_API_URL: ${{ vars.PRODUCTION_INTERNAL_API_URL || '' }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run validate:load-test-safety
      - name: Setup test database
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "PAYMENT_WEBHOOK_SECRET=$PAYMENT_WEBHOOK_SECRET" >> .env
          pnpm --filter @jeevatix/core run db:push
      - run: pnpm run test
      - run: pnpm run build
      - name: Validate frontend bundles do not target localhost API
        run: |
          if rg -n "http://localhost:8787" apps/admin/.svelte-kit apps/buyer/.svelte-kit apps/seller/.svelte-kit; then
            echo "Frontend build artifacts still point to localhost API"
            exit 1
          fi
      - run: pnpm run deploy --stage production
        env:
          APP_ENVIRONMENT: production
          APP_VERSION: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PRODUCTION_PAYMENT_WEBHOOK_SECRET }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          UPLOAD_PUBLIC_URL: ${{ vars.PRODUCTION_UPLOAD_PUBLIC_URL }}
          PARTY_SECRET: ${{ secrets.PARTY_SECRET }}
          PARTYKIT_HOST: ${{ vars.PARTYKIT_HOST }}
          TICKET_RESERVER_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          TICKET_RESERVER_DB_MAX_CONNECTIONS: ${{ vars.TICKET_RESERVER_DB_MAX_CONNECTIONS }}
          R2_BUCKET_NAME: ${{ vars.PRODUCTION_R2_BUCKET_NAME }}
          RESERVATION_CLEANUP_QUEUE_NAME: ${{ vars.PRODUCTION_RESERVATION_CLEANUP_QUEUE_NAME }}
          PRODUCTION_API_DOMAIN: ${{ vars.PRODUCTION_API_DOMAIN }}
          PRODUCTION_BUYER_DOMAIN: ${{ vars.PRODUCTION_BUYER_DOMAIN }}
          PRODUCTION_ADMIN_DOMAIN: ${{ vars.PRODUCTION_ADMIN_DOMAIN }}
          PRODUCTION_SELLER_DOMAIN: ${{ vars.PRODUCTION_SELLER_DOMAIN }}
          CORS_ALLOWED_ORIGINS: ${{ vars.PRODUCTION_CORS_ALLOWED_ORIGINS }}
          HYPERDRIVE_CA_CERT_ID: ${{ secrets.PRODUCTION_HYPERDRIVE_CA_CERT_ID }}
          HYPERDRIVE_SSLMODE: ${{ vars.PRODUCTION_HYPERDRIVE_SSLMODE }}
          INTERNAL_API_URL: ${{ vars.PRODUCTION_INTERNAL_API_URL || '' }}
      - name: Smoke Test
        run: |
          API_URL="${{ vars.PRODUCTION_API_URL || 'https://api.jeevatix.com' }}"
          health_payload="$(curl -fsS "$API_URL/health")"
          HEALTH_PAYLOAD="$health_payload" node - <<'EOF'
          const payload = JSON.parse(process.env.HEALTH_PAYLOAD ?? '{}');

          if (payload.status !== 'ok' || !payload.timestamp || !payload.version) {
            console.error('Unexpected health payload:', payload);
            process.exit(1);
          }

          if (payload.environment !== 'production') {
            console.error('Expected production environment, got:', payload.environment);
            process.exit(1);
          }
          EOF
          echo "✅ Production API health check passed"
          echo "Version deployed: ${{ github.sha }}"
      - name: Post-deploy SSR canary
        run: |
          set -e
          echo "Waiting 30s for Cloudflare propagation..."
          sleep 30

          # NOTE: Use workers.dev URLs to bypass Cloudflare's IP-based block
          # of GitHub Actions runner egress (Microsoft Azure ASN). Custom
          # domains return 403 Cloudflare challenge to GH Actions IPs.
          # workers.dev URLs route directly to Workers, bypassing the
          # zone-level CF security layer. Configure via GH vars below for
          # production once production workers.dev URLs are known.
          API_URL="${API_WORKERS_DEV_URL:-}"
          BUYER_URL="${BUYER_WORKERS_DEV_URL:-}"
          SELLER_URL="${SELLER_WORKERS_DEV_URL:-}"
          ADMIN_URL="${ADMIN_WORKERS_DEV_URL:-}"

          if [ -z "$API_URL" ] || [ -z "$BUYER_URL" ] || [ -z "$SELLER_URL" ] || [ -z "$ADMIN_URL" ]; then
            echo "⚠️  workers.dev URLs not configured for production canary."
            echo "    Set PRODUCTION_API_WORKERS_DEV_URL, PRODUCTION_BUYER_WORKERS_DEV_URL,"
            echo "    PRODUCTION_SELLER_WORKERS_DEV_URL, PRODUCTION_ADMIN_WORKERS_DEV_URL"
            echo "    GitHub vars after first production deploy completes (URLs are"
            echo "    visible in deploy output)."
            echo "    Skipping canary — Smoke Test step above already validates API."
            exit 0
          fi

          declare -a CHECKS=(
            "GET|$API_URL/health|200"
            "GET|$BUYER_URL/login|200"
            "GET|$SELLER_URL/login|200"
            "GET|$ADMIN_URL/login|200"
            "POST|$SELLER_URL/login|200,400,401,403"
          )

          fail=0
          for spec in "${CHECKS[@]}"; do
            method="${spec%%|*}"; rest="${spec#*|}"
            url="${rest%%|*}"; expected="${rest#*|}"

            if [ "$method" = "POST" ]; then
              # Origin header satisfies SvelteKit CSRF.
              origin="$(echo "$url" | sed -E 's#^(https?://[^/]+).*#\1#')"
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
                -X POST "$url" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -H "Origin: $origin" \
                --data "email=canary@invalid.test&password=invalid" \
                || echo "000")
            else
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            fi

            echo "$method $url -> $status (expected: $expected)"

            if [ "$status" = "000" ] || [ "$status" -ge 500 ]; then
              echo "  ❌ FAIL: 5xx or timeout indicates SSR/W2W routing broken"
              fail=1
              continue
            fi

            ok=0
            IFS=',' read -ra exp_arr <<< "$expected"
            for code in "${exp_arr[@]}"; do
              if [ "$status" = "$code" ]; then ok=1; break; fi
            done

            if [ $ok -eq 0 ]; then
              echo "  ⚠️  Unexpected status (not 5xx, but not in expected set)"
            else
              echo "  ✅ OK"
            fi
          done

          if [ $fail -ne 0 ]; then
            echo "Canary failed. Recent same-zone W2W 522 fix may have regressed."
            exit 1
          fi
          echo "✅ Canary passed: all SSR routes responding without 5xx"
        env:
          API_WORKERS_DEV_URL: ${{ vars.PRODUCTION_API_WORKERS_DEV_URL }}
          BUYER_WORKERS_DEV_URL: ${{ vars.PRODUCTION_BUYER_WORKERS_DEV_URL }}
          SELLER_WORKERS_DEV_URL: ${{ vars.PRODUCTION_SELLER_WORKERS_DEV_URL }}
          ADMIN_WORKERS_DEV_URL: ${{ vars.PRODUCTION_ADMIN_WORKERS_DEV_URL }}
