name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jeevatix
          POSTGRES_PASSWORD: jeevatix
          POSTGRES_DB: jeevatix_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PUBLIC_API_BASE_URL: https://api.jeevatix.my.id
      PUBLIC_PARTYKIT_HOST: ${{ vars.PUBLIC_PARTYKIT_HOST }}
      DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix_test
      JWT_SECRET: vitest-ci-secret
      PAYMENT_WEBHOOK_SECRET: vitest-ci-webhook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run validate:load-test-safety
      - name: Setup test database
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "PAYMENT_WEBHOOK_SECRET=$PAYMENT_WEBHOOK_SECRET" >> .env
          pnpm --filter @jeevatix/core run db:push
      - run: pnpm run test
      - run: pnpm run build
      - name: Validate frontend bundles do not target localhost API
        run: |
          if rg -n "http://localhost:8787" apps/admin/.svelte-kit apps/buyer/.svelte-kit apps/seller/.svelte-kit; then
            echo "Frontend build artifacts still point to localhost API"
            exit 1
          fi
      - run: pnpm run deploy --stage staging
        env:
          APP_ENVIRONMENT: staging
          APP_VERSION: ${{ github.sha }}
          SKIP_DURABLE_OBJECT_MIGRATIONS: '1'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          UPLOAD_PUBLIC_URL: ${{ vars.UPLOAD_PUBLIC_URL }}
          PARTY_SECRET: ${{ secrets.PARTY_SECRET }}
          PARTYKIT_HOST: ${{ vars.PARTYKIT_HOST }}
          TICKET_RESERVER_DATABASE_URL: ${{ secrets.TICKET_RESERVER_DATABASE_URL }}
          TICKET_RESERVER_DB_MAX_CONNECTIONS: ${{ vars.TICKET_RESERVER_DB_MAX_CONNECTIONS }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          RESERVATION_CLEANUP_QUEUE_NAME: ${{ vars.RESERVATION_CLEANUP_QUEUE_NAME }}
          STAGING_API_DOMAIN: ${{ vars.STAGING_API_DOMAIN }}
          STAGING_BUYER_DOMAIN: ${{ vars.STAGING_BUYER_DOMAIN }}
          STAGING_ADMIN_DOMAIN: ${{ vars.STAGING_ADMIN_DOMAIN }}
          STAGING_SELLER_DOMAIN: ${{ vars.STAGING_SELLER_DOMAIN }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          HYPERDRIVE_CA_CERT_ID: ${{ secrets.HYPERDRIVE_CA_CERT_ID }}
          HYPERDRIVE_SSLMODE: ${{ vars.HYPERDRIVE_SSLMODE }}
          INTERNAL_API_URL: ${{ vars.STAGING_INTERNAL_API_URL || 'https://jeevatix-staging-api.ariefna95.workers.dev' }}
      - name: Smoke Test
        run: |
          health_payload="$(curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/health)"
          HEALTH_PAYLOAD="$health_payload" node - <<'EOF'
          const payload = JSON.parse(process.env.HEALTH_PAYLOAD ?? '{}');

          if (payload.status !== 'ok' || !payload.timestamp || !payload.version) {
            console.error('Unexpected health payload:', payload);
            process.exit(1);
          }
          EOF
          echo "✅ API health check passed"
          echo "Note: Skipping frontend smoke tests - staging uses workers.dev URLs"
      - name: Post-deploy SSR canary
        run: |
          set -e
          echo "Waiting 30s for Cloudflare propagation..."
          sleep 30

          # NOTE: Use workers.dev URLs to bypass Cloudflare's IP-based block
          # of GitHub Actions runner egress (Microsoft Azure ASN). Custom
          # domains (api.jeevatix.my.id etc.) return 403 Cloudflare challenge
          # to GH Actions IPs. workers.dev URLs route directly to Workers,
          # bypassing the zone-level CF security layer.
          API_URL="${API_WORKERS_DEV_URL:-https://jeevatix-staging-api.ariefna95.workers.dev}"
          BUYER_URL="${BUYER_WORKERS_DEV_URL:-https://jeevatix-staging-buyer.ariefna95.workers.dev}"
          SELLER_URL="${SELLER_WORKERS_DEV_URL:-https://jeevatix-staging-seller.ariefna95.workers.dev}"
          ADMIN_URL="${ADMIN_WORKERS_DEV_URL:-https://jeevatix-staging-admin.ariefna95.workers.dev}"

          # CHECKS:
          # - GET /health on API: backend alive
          # - GET /login on each portal: portal Worker alive
          # - POST /login on seller (with Origin): SvelteKit form action
          #   triggers actual SSR fetch to API. This is the W2W path that
          #   was broken in commit e38003f/048990b. 5xx/timeout here = same
          #   regression returning. Origin header satisfies SvelteKit CSRF
          #   protection so request reaches the form action.
          declare -a CHECKS=(
            "GET|$API_URL/health|200"
            "GET|$BUYER_URL/login|200"
            "GET|$SELLER_URL/login|200"
            "GET|$ADMIN_URL/login|200"
            "POST|$SELLER_URL/login|200,400,401,403"
          )

          fail=0
          for spec in "${CHECKS[@]}"; do
            method="${spec%%|*}"; rest="${spec#*|}"
            url="${rest%%|*}"; expected="${rest#*|}"

            if [ "$method" = "POST" ]; then
              # Origin header satisfies SvelteKit CSRF; required to reach form action.
              origin="$(echo "$url" | sed -E 's#^(https?://[^/]+).*#\1#')"
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
                -X POST "$url" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -H "Origin: $origin" \
                --data "email=canary@invalid.test&password=invalid" \
                || echo "000")
            else
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            fi

            echo "$method $url -> $status (expected: $expected)"

            if [ "$status" = "000" ] || [ "$status" -ge 500 ]; then
              echo "  ❌ FAIL: 5xx or timeout indicates SSR/W2W routing broken"
              fail=1
              continue
            fi

            ok=0
            IFS=',' read -ra exp_arr <<< "$expected"
            for code in "${exp_arr[@]}"; do
              if [ "$status" = "$code" ]; then ok=1; break; fi
            done

            if [ $ok -eq 0 ]; then
              echo "  ⚠️  Unexpected status (not 5xx, but not in expected set)"
            else
              echo "  ✅ OK"
            fi
          done

          if [ $fail -ne 0 ]; then
            echo "Canary failed. Recent same-zone W2W 522 fix may have regressed."
            exit 1
          fi
          echo "✅ Canary passed: all SSR routes responding without 5xx"
        env:
          API_WORKERS_DEV_URL: ${{ vars.STAGING_API_WORKERS_DEV_URL }}
          BUYER_WORKERS_DEV_URL: ${{ vars.STAGING_BUYER_WORKERS_DEV_URL }}
          SELLER_WORKERS_DEV_URL: ${{ vars.STAGING_SELLER_WORKERS_DEV_URL }}
          ADMIN_WORKERS_DEV_URL: ${{ vars.STAGING_ADMIN_WORKERS_DEV_URL }}
