name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - name: Validate frontend bundles do not target localhost API
        run: |
          if rg -n "http://localhost:8787" apps/admin/.svelte-kit apps/buyer/.svelte-kit apps/seller/.svelte-kit; then
            echo "Frontend build artifacts still point to localhost API"
            exit 1
          fi
      - run: pnpm run deploy --stage production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Smoke Test
        run: |
          curl -f https://api.jeevatix.com/health || exit 1
          curl -f https://jeevatix.com || exit 1
          curl -f https://admin.jeevatix.com/login || exit 1
          curl -f https://seller.jeevatix.com/login || exit 1