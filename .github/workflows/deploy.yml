name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jeevatix
          POSTGRES_PASSWORD: jeevatix
          POSTGRES_DB: jeevatix_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PUBLIC_API_BASE_URL: https://api.jeevatix.my.id
      PUBLIC_PARTYKIT_HOST: ${{ vars.PUBLIC_PARTYKIT_HOST }}
      DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix_test
      JWT_SECRET: vitest-ci-secret
      PAYMENT_WEBHOOK_SECRET: vitest-ci-webhook-secret
      # SvelteKit `analyse` postbuild loads SSR chunks in Node, where the
      # Track B guard in apps/{buyer,seller,admin}/src/lib/{auth,http}.ts
      # evaluates at module load. Without INTERNAL_API_URL the guard throws
      # and the build fails before deploy. Set at top-level so build step
      # also receives it (deploy step has its own redeclaration below).
      INTERNAL_API_URL: ${{ vars.STAGING_INTERNAL_API_URL || 'https://jeevatix-staging-api.ariefna95.workers.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run validate:load-test-safety
      - name: Setup test database
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "PAYMENT_WEBHOOK_SECRET=$PAYMENT_WEBHOOK_SECRET" >> .env
          pnpm --filter @jeevatix/core run db:push
      - run: pnpm run test
      - run: pnpm run build
      - name: Validate frontend bundles do not target localhost API
        run: |
          if rg -n "http://localhost:8787" apps/admin/.svelte-kit apps/buyer/.svelte-kit apps/seller/.svelte-kit; then
            echo "Frontend build artifacts still point to localhost API"
            exit 1
          fi
      - run: pnpm run deploy --stage staging
        env:
          APP_ENVIRONMENT: staging
          APP_VERSION: ${{ github.sha }}
          SKIP_DURABLE_OBJECT_MIGRATIONS: '1'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          UPLOAD_PUBLIC_URL: ${{ vars.UPLOAD_PUBLIC_URL }}
          PARTY_SECRET: ${{ secrets.PARTY_SECRET }}
          PARTYKIT_HOST: ${{ vars.PARTYKIT_HOST }}
          TICKET_RESERVER_DATABASE_URL: ${{ secrets.TICKET_RESERVER_DATABASE_URL }}
          TICKET_RESERVER_DB_MAX_CONNECTIONS: ${{ vars.TICKET_RESERVER_DB_MAX_CONNECTIONS }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          RESERVATION_CLEANUP_QUEUE_NAME: ${{ vars.RESERVATION_CLEANUP_QUEUE_NAME }}
          STAGING_API_DOMAIN: ${{ vars.STAGING_API_DOMAIN }}
          STAGING_BUYER_DOMAIN: ${{ vars.STAGING_BUYER_DOMAIN }}
          STAGING_ADMIN_DOMAIN: ${{ vars.STAGING_ADMIN_DOMAIN }}
          STAGING_SELLER_DOMAIN: ${{ vars.STAGING_SELLER_DOMAIN }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          HYPERDRIVE_CA_CERT_ID: ${{ secrets.HYPERDRIVE_CA_CERT_ID }}
          HYPERDRIVE_SSLMODE: ${{ vars.HYPERDRIVE_SSLMODE }}
          INTERNAL_API_URL: ${{ vars.STAGING_INTERNAL_API_URL || 'https://jeevatix-staging-api.ariefna95.workers.dev' }}
          SENTRY_DSN_API: ${{ secrets.STAGING_SENTRY_DSN_API }}
          SENTRY_DSN_BUYER: ${{ secrets.STAGING_SENTRY_DSN_BUYER }}
          SENTRY_DSN_SELLER: ${{ secrets.STAGING_SENTRY_DSN_SELLER }}
          SENTRY_DSN_ADMIN: ${{ secrets.STAGING_SENTRY_DSN_ADMIN }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.STAGING_SENTRY_TRACES_SAMPLE_RATE }}
      - name: Smoke Test
        run: |
          health_payload="$(curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/health)"
          HEALTH_PAYLOAD="$health_payload" node - <<'EOF'
          const payload = JSON.parse(process.env.HEALTH_PAYLOAD ?? '{}');

          if (payload.status !== 'ok' || !payload.timestamp || !payload.version) {
            console.error('Unexpected health payload:', payload);
            process.exit(1);
          }
          EOF
          echo "✅ API health check passed"
          echo "Note: Skipping frontend smoke tests - staging uses workers.dev URLs"
      - name: Post-deploy SSR canary
        run: |
          set -e
          echo "Waiting 30s for Cloudflare propagation..."
          sleep 30

          # ----------------------------------------------------------------
          # WHY THIS STEP HAS TWO LAYERS (status + security headers):
          #
          # PR #14 hotfixed a buyer 500 caused by a CSP misconfiguration
          # (reportOnly without report-uri) that landed via PR #12. That bug
          # class — a security/CSP/auth header misconfig that builds cleanly
          # but breaks SSR — was caught by accident via the 5xx status code.
          # The canary couldn't tell us WHICH portal/header diverged, only
          # that something was on fire.
          #
          # These explicit security-header assertions catch the next misconfig
          # at the source, naming the missing header on the failing portal
          # before any user sees a 5xx. Status-code checks remain (they catch
          # SSR/W2W routing breakage); header checks add defense in depth.
          #
          # API /health is intentionally NOT subject to security header
          # checks: it's a JSON endpoint, not a browser-rendered surface, and
          # has a different policy by design.
          # ----------------------------------------------------------------

          # NOTE: Use workers.dev URLs to bypass Cloudflare's IP-based block
          # of GitHub Actions runner egress (Microsoft Azure ASN). Custom
          # domains (api.jeevatix.my.id etc.) return 403 Cloudflare challenge
          # to GH Actions IPs. workers.dev URLs route directly to Workers,
          # bypassing the zone-level CF security layer.
          API_URL="${API_WORKERS_DEV_URL:-https://jeevatix-staging-api.ariefna95.workers.dev}"
          BUYER_URL="${BUYER_WORKERS_DEV_URL:-https://jeevatix-staging-buyer.ariefna95.workers.dev}"
          SELLER_URL="${SELLER_WORKERS_DEV_URL:-https://jeevatix-staging-seller.ariefna95.workers.dev}"
          ADMIN_URL="${ADMIN_WORKERS_DEV_URL:-https://jeevatix-staging-admin.ariefna95.workers.dev}"

          # CHECKS:
          # - GET /health on API: backend alive
          # - GET /login on each portal: portal Worker alive
          # - POST /login on seller (with Origin): SvelteKit form action
          #   triggers actual SSR fetch to API. This is the W2W path that
          #   was broken in commit e38003f/048990b. 5xx/timeout here = same
          #   regression returning. Origin header satisfies SvelteKit CSRF
          #   protection so request reaches the form action.
          declare -a CHECKS=(
            "GET|$API_URL/health|200"
            "GET|$BUYER_URL/login|200"
            "GET|$SELLER_URL/login|200"
            "GET|$ADMIN_URL/login|200"
            "POST|$SELLER_URL/login|200,400,401,403"
          )

          fail=0
          for spec in "${CHECKS[@]}"; do
            method="${spec%%|*}"; rest="${spec#*|}"
            url="${rest%%|*}"; expected="${rest#*|}"

            if [ "$method" = "POST" ]; then
              # Origin header satisfies SvelteKit CSRF; required to reach form action.
              origin="$(echo "$url" | sed -E 's#^(https?://[^/]+).*#\1#')"
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
                -X POST "$url" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -H "Origin: $origin" \
                --data "email=canary@invalid.test&password=invalid" \
                || echo "000")
            else
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            fi

            echo "$method $url -> $status (expected: $expected)"

            if [ "$status" = "000" ] || [ "$status" -ge 500 ]; then
              echo "  ❌ FAIL: 5xx or timeout indicates SSR/W2W routing broken"
              fail=1
              continue
            fi

            ok=0
            IFS=',' read -ra exp_arr <<< "$expected"
            for code in "${exp_arr[@]}"; do
              if [ "$status" = "$code" ]; then ok=1; break; fi
            done

            if [ $ok -eq 0 ]; then
              echo "  ⚠️  Unexpected status (not 5xx, but not in expected set)"
            else
              echo "  ✅ OK"
            fi
          done

          # ----------------------------------------------------------------
          # Security header smoke checks on each portal /login.
          #
          # Required (any missing header => fail):
          #   - content-security-policy OR content-security-policy-report-only
          #   - x-frame-options: DENY (exact)
          #   - x-content-type-options: nosniff (exact)
          #   - referrer-policy: <any non-empty value>
          #   - permissions-policy: <any non-empty value>
          #
          # Failures are collected (not bail-on-first) so one run names every
          # missing header on every portal — much faster triage than fix-rerun.
          # ----------------------------------------------------------------
          declare -a HEADER_FAILURES=()

          # Lowercases header names so comparisons are case-insensitive.
          # Removes CR (curl outputs CRLF on HTTP/2 too).
          fetch_lower_headers() {
            curl -sS -I --max-time 30 "$1" 2>/dev/null | tr -d '\r' | tr 'A-Z' 'a-z' || true
          }

          # has_header <headers> <name>
          has_header() {
            printf '%s\n' "$1" | grep -qE "^$2:"
          }

          # header_value <headers> <name>  (returns first match, value only)
          header_value() {
            printf '%s\n' "$1" | grep -iE "^$2:" | head -n1 | sed -E "s/^$2:[[:space:]]*//I"
          }

          check_portal_headers() {
            local portal="$1" url="$2"
            local headers
            headers="$(fetch_lower_headers "$url")"

            if [ -z "$headers" ]; then
              HEADER_FAILURES+=("$portal: could not fetch headers from $url")
              echo "  ❌ $portal: no headers returned"
              return
            fi

            echo "Security headers for $portal ($url):"

            # CSP: enforced OR report-only — at least one must exist.
            if has_header "$headers" "content-security-policy" \
              || has_header "$headers" "content-security-policy-report-only"; then
              echo "  ✅ content-security-policy[-report-only]"
            else
              HEADER_FAILURES+=("$portal: missing content-security-policy and content-security-policy-report-only")
              echo "  ❌ content-security-policy[-report-only] missing"
            fi

            # X-Frame-Options: must be DENY exactly.
            local xfo
            xfo="$(header_value "$headers" "x-frame-options")"
            if [ -z "$xfo" ]; then
              HEADER_FAILURES+=("$portal: missing x-frame-options")
              echo "  ❌ x-frame-options missing"
            elif [ "$xfo" != "deny" ]; then
              HEADER_FAILURES+=("$portal: x-frame-options is '$xfo', expected 'DENY'")
              echo "  ❌ x-frame-options is '$xfo' (expected DENY)"
            else
              echo "  ✅ x-frame-options: DENY"
            fi

            # X-Content-Type-Options: must be nosniff exactly.
            local xcto
            xcto="$(header_value "$headers" "x-content-type-options")"
            if [ -z "$xcto" ]; then
              HEADER_FAILURES+=("$portal: missing x-content-type-options")
              echo "  ❌ x-content-type-options missing"
            elif [ "$xcto" != "nosniff" ]; then
              HEADER_FAILURES+=("$portal: x-content-type-options is '$xcto', expected 'nosniff'")
              echo "  ❌ x-content-type-options is '$xcto' (expected nosniff)"
            else
              echo "  ✅ x-content-type-options: nosniff"
            fi

            # Referrer-Policy: any non-empty value.
            local rp
            rp="$(header_value "$headers" "referrer-policy")"
            if [ -z "$rp" ]; then
              HEADER_FAILURES+=("$portal: missing referrer-policy")
              echo "  ❌ referrer-policy missing"
            else
              echo "  ✅ referrer-policy: $rp"
            fi

            # Permissions-Policy: any non-empty value.
            local pp
            pp="$(header_value "$headers" "permissions-policy")"
            if [ -z "$pp" ]; then
              HEADER_FAILURES+=("$portal: missing permissions-policy")
              echo "  ❌ permissions-policy missing"
            else
              echo "  ✅ permissions-policy present"
            fi
          }

          echo ""
          echo "===== Security header smoke checks ====="
          check_portal_headers "buyer"  "$BUYER_URL/login"
          check_portal_headers "seller" "$SELLER_URL/login"
          check_portal_headers "admin"  "$ADMIN_URL/login"
          echo "========================================"

          if [ ${#HEADER_FAILURES[@]} -ne 0 ]; then
            echo ""
            echo "❌ Security header smoke FAILED:"
            for f in "${HEADER_FAILURES[@]}"; do
              echo "  - $f"
            done
            fail=1
          else
            echo "✅ Security header smoke passed: all required headers present on every portal"
          fi

          if [ $fail -ne 0 ]; then
            echo ""
            echo "Canary failed. SSR routing OR security header regression detected."
            exit 1
          fi
          echo "✅ Canary passed: SSR + security headers green on every portal"
        env:
          API_WORKERS_DEV_URL: ${{ vars.STAGING_API_WORKERS_DEV_URL }}
          BUYER_WORKERS_DEV_URL: ${{ vars.STAGING_BUYER_WORKERS_DEV_URL }}
          SELLER_WORKERS_DEV_URL: ${{ vars.STAGING_SELLER_WORKERS_DEV_URL }}
          ADMIN_WORKERS_DEV_URL: ${{ vars.STAGING_ADMIN_WORKERS_DEV_URL }}
