name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success' }}
    
    env:
      E2E_TARGET: staging
      CI: "true"
      PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify staging API health
        run: |
          echo "Checking staging API health..."
          curl -fsS --retry 3 --retry-delay 5 \
            https://jeevatix-staging-api.ariefna95.workers.dev/health
          echo ""
          echo "✅ Staging API is healthy"

      - name: Warm up staging Workers
        run: |
          echo "Warming up API endpoints..."
          curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/categories || true
          curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/events?limit=1 || true
          curl -fsS https://jeevatix-staging-buyer.ariefna95.workers.dev/ || true
          curl -fsS https://jeevatix-staging-seller.ariefna95.workers.dev/login || true
          curl -fsS https://jeevatix-staging-admin.ariefna95.workers.dev/login || true
          sleep 2
          echo "✅ Workers warmed up"

      - name: Run E2E tests against staging
        run: |
          pnpm exec playwright test \
            --project=critical \
            --project=auth \
            --project=auth-seller \
            --project=auth-admin \
            --project=auth-password-reset \
            --project=events \
            --project=checkout \
            --project=admin-management \
            --project=buyer-features \
            --project=seller-features
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Reset staging DB to clean demo state
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          pnpm --filter @jeevatix/core exec tsx src/db/reset-staging.ts
          pnpm --filter @jeevatix/core run db:push
          pnpm --filter @jeevatix/core exec tsx src/db/seed-staging.ts
