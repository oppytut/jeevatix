name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix
      JWT_SECRET: test-secret-key-for-ci-only
      PAYMENT_WEBHOOK_SECRET: test-webhook-secret
      EMAIL_API_KEY: test-email-key
      EMAIL_FROM: test@jeevatix.com
      UPLOAD_PUBLIC_URL: http://localhost:8787/uploads
      PLAYWRIGHT_E2E: "1"
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        
      - name: Create .env file for API
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          PAYMENT_WEBHOOK_SECRET=${{ env.PAYMENT_WEBHOOK_SECRET }}
          EMAIL_API_KEY=${{ env.EMAIL_API_KEY }}
          EMAIL_FROM=${{ env.EMAIL_FROM }}
          UPLOAD_PUBLIC_URL=${{ env.UPLOAD_PUBLIC_URL }}
          PLAYWRIGHT_E2E=${{ env.PLAYWRIGHT_E2E }}
          EOF
          
      - name: Setup test database
        run: |
          docker compose up -d
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U jeevatix; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          docker compose ps
          
      - name: Run database migrations
        run: pnpm --filter @jeevatix/core run db:push
          
      - name: Seed test data
        run: pnpm --filter @jeevatix/core run db:seed:e2e
        
      - name: Debug - Check environment
        run: |
          echo "=== Environment Check ==="
          echo "DATABASE_URL is set: $([[ -n "$DATABASE_URL" ]] && echo "yes" || echo "no")"
          echo "JWT_SECRET is set: $([[ -n "$JWT_SECRET" ]] && echo "yes" || echo "no")"
          echo ".env file exists: $(test -f .env && echo "yes" || echo "no")"
          echo "Docker containers:"
          docker compose ps
          echo "=== End Environment Check ==="
          
      - name: Run E2E tests locally
        run: pnpm exec playwright test --project=critical --project=auth --project=events
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
