name: E2E Tests

# Temporarily disabled - E2E tests require complex mock API setup
# Run E2E tests locally with: pnpm exec playwright test
# on:
#   push:
#     branches: [main, develop]
#   pull_request:
#     branches: [main, develop]

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jeevatix
          POSTGRES_PASSWORD: jeevatix
          POSTGRES_DB: jeevatix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        
      - name: Setup environment
        run: |
          cp .env.example .env
          echo "DATABASE_URL=postgresql://jeevatix:jeevatix@localhost:5432/jeevatix" >> .env
          echo "PLAYWRIGHT_E2E=1" >> .env
          
      - name: Run database migrations
        run: pnpm --filter @jeevatix/core run db:push
        env:
          DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix
        
      - name: Run E2E tests
        run: pnpm exec playwright test --project=buyer --project=admin --project=seller --grep-invert "@requires-auth"
        env:
          DATABASE_URL: postgresql://jeevatix:jeevatix@localhost:5432/jeevatix
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
