name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    env:
      E2E_TARGET: staging
      CI: "true"
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify staging API health
        run: |
          echo "Checking staging API health..."
          curl -fsS --retry 3 --retry-delay 5 \
            https://jeevatix-staging-api.ariefna95.workers.dev/health
          echo ""
          echo "✅ Staging API is healthy"

      - name: Warm up staging Workers
        run: |
          echo "Warming up API endpoints..."
          curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/categories || true
          curl -fsS https://jeevatix-staging-api.ariefna95.workers.dev/events?limit=1 || true
          curl -fsS https://jeevatix-staging-buyer.ariefna95.workers.dev/ || true
          curl -fsS https://jeevatix-staging-seller.ariefna95.workers.dev/login || true
          curl -fsS https://jeevatix-staging-admin.ariefna95.workers.dev/login || true
          sleep 2
          echo "✅ Workers warmed up"

      - name: Run E2E tests against staging
        run: |
          pnpm exec playwright test \
            --project=critical \
            --project=auth \
            --project=auth-seller \
            --project=auth-admin \
            --project=auth-password-reset \
            --project=events \
            --project=checkout \
            --project=admin-management \
            --project=buyer-features \
            --project=seller-features
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
