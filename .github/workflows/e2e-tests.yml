name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    env:
      E2E_TARGET: staging
      CI: "true"
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify staging API health
        run: |
          echo "Checking staging API health..."
          curl -fsS --retry 3 --retry-delay 5 \
            https://jeevatix-staging-api.ariefna95.workers.dev/health
          echo ""
          echo "✅ Staging API is healthy"

      - name: Run E2E tests against staging
        run: pnpm exec playwright test --project=critical --project=auth --project=events
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
