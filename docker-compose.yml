services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: jeevatix
      POSTGRES_USER: jeevatix
      POSTGRES_PASSWORD: jeevatix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jeevatix -d jeevatix']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata: